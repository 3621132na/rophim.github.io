<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>OPhim Movie App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: #000;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    input, select {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
    }

    .movie-card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .movie-card:hover {
      transform: scale(1.05);
    }

    .movie-card img {
      width: 100%;
      border-radius: 5px;
    }

    .detail img {
      width: 200px;
    }

    iframe {
      width: 100%;
      height: 500px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<header>
  <h2 onclick="loadHome()">🎬 OPhim</h2> <!-- Thêm sự kiện onclick vào logo -->
  <div>
    <input type="text" id="searchInput" placeholder="Tìm phim...">
    <button onclick="searchMovie()">Tìm</button>
  </div>
  <div>
    <select id="genreFilter" onchange="filterByGenre()">
      <option value="">Chọn thể loại</option>
    </select>
    <select id="countryFilter" onchange="filterByCountry()">
      <option value="">Chọn quốc gia</option>
    </select>
    <select id="yearFilter" onchange="filterByYear()">
      <option value="">Chọn năm phát hành</option>
    </select>
  </div>
</header>

<div class="container" id="content"></div>

<script>
const API = "https://ophim1.com/v1/api";
const content = document.getElementById("content");
const genreFilter = document.getElementById("genreFilter");
const countryFilter = document.getElementById("countryFilter");
const yearFilter = document.getElementById("yearFilter");

// =======================
// LẤY DỮ LIỆU BAN ĐẦU
// =======================
async function loadHome() {
  const res = await fetch(`${API}/home`, {method: 'GET', headers: {accept: 'application/json'}});
  const result = await res.json();

  const movies = result.data.items;
  const cdn = result.data.APP_DOMAIN_CDN_IMAGE;

  renderMovies(movies, cdn);
  loadFilters();  // Tải danh sách thể loại, quốc gia, năm phát hành
}

// =======================
// HIỂN THỊ DANH SÁCH PHIM
// =======================
function renderMovies(movies, cdn) {
  content.innerHTML = `<div class="movie-grid"></div>`;
  const grid = document.querySelector(".movie-grid");

  if (!movies || movies.length === 0) {
    grid.innerHTML = `<p>Không có phim nào để hiển thị.</p>`;
    return;
  }

  movies.forEach(movie => {
    const img = `${cdn}/uploads/movies/${movie.thumb_url}`;

    grid.innerHTML += `
      <div class="movie-card" onclick="loadDetail('${movie.slug}')">
        <img src="${img}" />
        <p>${movie.name}</p>
        <small>${movie.episode_current}</small>
      </div>
    `;
  });
}

// =======================
// LẤY DỮ LIỆU CHI TIẾT PHIM
// =======================
async function loadDetail(slug) {
  const res = await fetch(`${API}/phim/${slug}`, {method: 'GET', headers: {accept: 'application/json'}});
  const result = await res.json();

  const movie = result.data.item;
  const cdn = result.data.APP_DOMAIN_CDN_IMAGE;

  content.innerHTML = `
    <div class="detail">
      <button onclick="loadHome()">⬅ Quay lại</button>
      <h2>${movie.name}</h2>
      <img src="${cdn}/uploads/movies/${movie.poster_url}" width="200"/>
      <p>${movie.content}</p>
      <p><b>Năm:</b> ${movie.year}</p>
      <p><b>Chất lượng:</b> ${movie.quality}</p>
      <p><b>Ngôn ngữ:</b> ${movie.lang}</p>
      <h3>Danh sách tập:</h3>
      <div id="episodes"></div>
      <div id="player"></div>
    </div>
  `;

  const episodesDiv = document.getElementById("episodes");

  if (movie.episodes && movie.episodes.length > 0) {
    movie.episodes.forEach(server => {
      episodesDiv.innerHTML += `<h4>${server.server_name}</h4>`;

      server.server_data.forEach(ep => {
        episodesDiv.innerHTML += `
          <button onclick="playVideo('${ep.link_embed}')">
            Tập ${ep.name}
          </button>
        `;
      });
    });
  } else {
    episodesDiv.innerHTML = "<p>Không có dữ liệu tập phim</p>";
  }
}

// =======================
// PHÁT VIDEO
// =======================
function playVideo(link) {
  document.getElementById("player").innerHTML = `
    <iframe src="${link}" frameborder="0" allowfullscreen></iframe>
  `;
}

// =======================
// TÌM KIẾM PHIM
// =======================
async function searchMovie() {
  const keyword = document.getElementById("searchInput").value.trim();
  if (!keyword) return;

  const res = await fetch(`${API}/tim-kiem?keyword=${keyword}`, {method: 'GET', headers: {accept: 'application/json'}});
  const data = await res.json();

  if (data.status === "success" && data.data.items.length > 0) {
    renderMovies(data.data.items, data.data.APP_DOMAIN_CDN_IMAGE);
  } else {
    content.innerHTML = "<p>Không tìm thấy phim nào phù hợp với từ khóa của bạn.</p>";
  }
}

// =======================
// LỌC THEO THỂ LOẠI
// =======================
async function filterByGenre() {
  const genreId = genreFilter.value;
  if (!genreId) return;

  const res = await fetch(`${API}/the-loai/${genreId}`, {method: 'GET', headers: {accept: 'application/json'}});
  const data = await res.json();

  if (data.status === "success" && data.data.items.length > 0) {
    renderMovies(data.data.items, data.data.APP_DOMAIN_CDN_IMAGE);
  } else {
    content.innerHTML = "<p>Không có phim nào thuộc thể loại này.</p>";
  }
}

// =======================
// LỌC THEO QUỐC GIA
// =======================
async function filterByCountry() {
  const countryId = countryFilter.value;
  if (!countryId) return;

  const res = await fetch(`${API}/quoc-gia/${countryId}`, {method: 'GET', headers: {accept: 'application/json'}});
  const data = await res.json();

  if (data.status === "success" && data.data.items.length > 0) {
    renderMovies(data.data.items, data.data.APP_DOMAIN_CDN_IMAGE);
  } else {
    content.innerHTML = "<p>Không có phim nào từ quốc gia này.</p>";
  }
}

// =======================
// LỌC THEO NĂM PHÁT HÀNH
// =======================
async function filterByYear() {
  const year = yearFilter.value;
  if (!year) return;

  const res = await fetch(`${API}/nam-phat-hanh/${year}`, {method: 'GET', headers: {accept: 'application/json'}});
  const data = await res.json();

  if (data.status === "success" && data.data.items.length > 0) {
    renderMovies(data.data.items, data.data.APP_DOMAIN_CDN_IMAGE);
  } else {
    content.innerHTML = "<p>Không có phim nào trong năm này.</p>";
  }
}

// =======================
// TẢI CÁC LỌC THỂ LOẠI, QUỐC GIA, NĂM
// =======================
async function loadFilters() {
  const resGenre = await fetch(`${API}/the-loai`, {method: 'GET', headers: {accept: 'application/json'}});
  const genres = await resGenre.json();
  genres.data.items.forEach(genre => {
    genreFilter.innerHTML += `<option value="${genre.slug}">${genre.name}</option>`;
  });

  const resCountry = await fetch(`${API}/quoc-gia`, {method: 'GET', headers: {accept: 'application/json'}});
  const countries = await resCountry.json();
  countries.data.items.forEach(country => {
    countryFilter.innerHTML += `<option value="${country.slug}">${country.name}</option>`;
  });

  const resYear = await fetch(`${API}/nam-phat-hanh`, {method: 'GET', headers: {accept: 'application/json'}});
  const years = await resYear.json();
  years.data.forEach(year => {
    yearFilter.innerHTML += `<option value="${year.slug}">${year.name}</option>`;
  });
}

// =======================
// CHẠY ỨNG DỤNG BAN ĐẦU
// =======================
loadHome();
</script>

</body>
</html>
